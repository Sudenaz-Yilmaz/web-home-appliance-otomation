<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Home Automation Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id="app-title">HOME APPLIANCE</h1>

    <div id="input-container" style="display: none;">
        <input type="text" id="devName" placeholder="Cihaz Adı">
        <input type="number" id="devStock" placeholder="Adet">
        <button id="addBtn">Sisteme Ekle</button>
    </div>

    <div id="table-wrapper" style="display: none;">
        <table>
            <thead>
                <tr>
                    <th>Cihaz</th>
                    <th>Kategori</th>
                    <th>Adet</th>
                    <th>Durum</th>
                </tr>
            </thead>
            <tbody id="tableContent"></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
